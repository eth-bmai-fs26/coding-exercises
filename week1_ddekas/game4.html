<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Epsilon Convergence - Game 4</title>
    <style>
        :root {
            --bg0: #05070c;
            --bg1: #0b1020;
            --grid: rgba(255, 255, 255, 0.06);
            --text: #e7e9ef;
            --muted: rgba(231, 233, 239, 0.75);
            --ok: #34d399;
            --bad: #fb7185;
            --accent: #7dd3fc;
        }

        body {
            margin: 0;
            background: radial-gradient(1200px 600px at 60% 20%, var(--bg1), var(--bg0));
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .wrap {
            width: 920px;
            max-width: calc(100% - 24px);
            margin: 14px auto;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.20);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .topbar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .controls label {
            font-size: 13px;
            color: var(--muted);
        }

        input[type="number"] {
            width: 80px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            outline: none;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        button {
            padding: 7px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(125, 211, 252, 0.10);
            color: var(--text);
            cursor: pointer;
        }

        button:hover {
            border-color: rgba(125, 211, 252, 0.50);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        canvas {
            width: 100%;
            height: 380px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.02));
            display: block;
        }

        .msg {
            margin-top: 6px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
            min-height: 18px;
        }

        .msg.success {
            color: var(--ok);
        }

        .msg.fail {
            color: var(--bad);
        }

        .help {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.35;
            text-align: center;
            max-width: 720px;
            margin: 0 auto;
        }

        .convergence-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 8px;
        }

        .convergence-table th,
        .convergence-table td {
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .convergence-table th {
            background: rgba(125, 211, 252, 0.1);
            color: var(--accent);
        }

        .convergence-table td {
            background: rgba(0, 0, 0, 0.2);
        }

        .convergence-table td.computed {
            color: var(--ok);
        }

        .convergence-table td.limit {
            color: var(--accent);
            font-weight: bold;
        }

        .epsilon-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .epsilon-display {
            font-size: 14px;
            color: var(--accent);
            min-width: 100px;
        }

        .w-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .w-selector label {
            font-size: 13px;
            color: var(--muted);
        }

        .limit-input {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .limit-input label {
            font-size: 13px;
            color: var(--muted);
        }

        input.correct {
            border-color: var(--ok);
            background: rgba(52, 211, 153, 0.15);
        }

        input.incorrect {
            border-color: var(--bad);
            background: rgba(251, 113, 133, 0.15);
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="row">
        <div class="topbar">
            <div class="w-selector">
                <label for="wValue">Choose w:</label>
                <input id="wValue" type="number" step="1" value="3"/>
                <button id="setWBtn">Set w</button>
            </div>
            <div class="epsilon-controls">
                <span class="epsilon-display">ε = <span id="epsilonLbl">1</span></span>
                <button id="shrinkBtn">Shrink ε by 10×</button>
                <button id="resetEpsBtn">Reset ε</button>
            </div>
        </div>

        <canvas id="c" width="920" height="380"></canvas>

        <table class="convergence-table">
            <thead>
                <tr>
                    <th>ε</th>
                    <th>f(w + ε)</th>
                    <th>f(w)</th>
                    <th>f(w + ε) − f(w)</th>
                    <th>[f(w + ε) − f(w)] / ε</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <div class="limit-input">
            <label>As ε → 0, the slope converges to:</label>
            <input id="limitGuess" type="number" step="0.1" placeholder="Enter limit"/>
            <button id="checkBtn">Check</button>
            <button id="newBtn">New w</button>
        </div>

        <div id="msg" class="msg"></div>

        <div class="help">
            Shrink ε progressively and observe how the difference quotient [f(w+ε) − f(w)] / ε converges.<br>
            When you see the pattern, enter the limit value the slope approaches as ε → 0.
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const wValueInput = document.getElementById("wValue");
    const setWBtn = document.getElementById("setWBtn");
    const epsilonLbl = document.getElementById("epsilonLbl");
    const shrinkBtn = document.getElementById("shrinkBtn");
    const resetEpsBtn = document.getElementById("resetEpsBtn");
    const tableBody = document.getElementById("tableBody");
    const limitGuess = document.getElementById("limitGuess");
    const checkBtn = document.getElementById("checkBtn");
    const newBtn = document.getElementById("newBtn");
    const msg = document.getElementById("msg");

    let currentW = 3;
    let epsilon = 1;
    let measurements = [];

    const xMin = -10, xMax = 15;

    // f(w) = w² - 4w + 7
    function f(w) {
        return w * w - 4 * w + 7;
    }

    // True derivative: f'(w) = 2w - 4
    function derivative(w) {
        return 2 * w - 4;
    }

    function X(x) {
        return (x - xMin) / (xMax - xMin) * canvas.width;
    }

    function findVisibleScale() {
        const n = 200;
        let ymin = Infinity, ymax = -Infinity;
        for (let i = 0; i <= n; i++) {
            const x = xMin + (xMax - xMin) * (i / n);
            const y = f(x);
            ymin = Math.min(ymin, y);
            ymax = Math.max(ymax, y);
        }
        const pad = 0.15 * (ymax - ymin);
        return {lo: ymin - pad, hi: ymax + pad};
    }

    let scale = findVisibleScale();

    function Y(y) {
        const padTop = 30, padBottom = 30;
        const h = canvas.height - padTop - padBottom;
        return padTop + (1 - (y - scale.lo) / (scale.hi - scale.lo)) * h;
    }

    function setMessage(text, kind) {
        msg.textContent = text || "";
        msg.classList.remove("success", "fail");
        if (kind) msg.classList.add(kind);
    }

    function formatNumber(n) {
        if (Math.abs(n) < 0.0001 && n !== 0) {
            return n.toExponential(4);
        }
        return Number(n.toFixed(6)).toString();
    }

    function addMeasurement() {
        const fw = f(currentW);
        const fwPlusEps = f(currentW + epsilon);
        const diff = fwPlusEps - fw;
        const slope = diff / epsilon;

        measurements.push({
            epsilon: epsilon,
            fwPlusEps: fwPlusEps,
            fw: fw,
            diff: diff,
            slope: slope
        });

        updateTable();
    }

    function updateTable() {
        tableBody.innerHTML = "";

        for (const m of measurements) {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${formatNumber(m.epsilon)}</td>
                <td>${formatNumber(m.fwPlusEps)}</td>
                <td>${formatNumber(m.fw)}</td>
                <td>${formatNumber(m.diff)}</td>
                <td class="computed">${formatNumber(m.slope)}</td>
            `;
            tableBody.appendChild(row);
        }

        // Add limit row hint
        if (measurements.length >= 3) {
            const limitRow = document.createElement("tr");
            limitRow.innerHTML = `
                <td class="limit">→ 0</td>
                <td class="limit">→ f(w)</td>
                <td class="limit">f(w)</td>
                <td class="limit">→ 0</td>
                <td class="limit">→ ?</td>
            `;
            tableBody.appendChild(limitRow);
        }
    }

    function resetEpsilon() {
        epsilon = 1;
        measurements = [];
        epsilonLbl.textContent = epsilon;
        updateTable();
        addMeasurement();
        draw();
    }

    function shrinkEpsilon() {
        if (epsilon > 1e-8) {
            epsilon /= 10;
            epsilonLbl.textContent = formatNumber(epsilon);
            addMeasurement();
            draw();
        }
    }

    function setW(newW) {
        currentW = newW;
        wValueInput.value = currentW;
        limitGuess.value = "";
        limitGuess.classList.remove("correct", "incorrect");
        checkBtn.disabled = false;
        setMessage("", null);
        resetEpsilon();
    }

    function drawStars() {
        const seed = 12345;
        function rand(i) {
            let x = (seed + i * 2654435761) >>> 0;
            x ^= x << 13; x >>>= 0;
            x ^= x >> 17; x >>>= 0;
            x ^= x << 5; x >>>= 0;
            return (x % 1000) / 1000;
        }
        for (let i = 0; i < 100; i++) {
            const rx = rand(i * 3 + 1);
            const ry = rand(i * 3 + 2);
            const r = rand(i * 3 + 3);
            const x = rx * canvas.width;
            const y = ry * canvas.height * 0.5;
            const a = 0.15 + 0.5 * r;
            ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
            ctx.fillRect(x, y, 1.2, 1.2);
        }
    }

    function drawGrid() {
        ctx.strokeStyle = "rgba(255,255,255,0.06)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        const stepX = canvas.width / 10;
        const stepY = canvas.height / 8;
        for (let i = 1; i < 10; i++) {
            ctx.moveTo(i * stepX, 0);
            ctx.lineTo(i * stepX, canvas.height);
        }
        for (let j = 1; j < 8; j++) {
            ctx.moveTo(0, j * stepY);
            ctx.lineTo(canvas.width, j * stepY);
        }
        ctx.stroke();
    }

    function drawCurve() {
        ctx.beginPath();
        const n = 200;
        for (let i = 0; i <= n; i++) {
            const x = xMin + (xMax - xMin) * (i / n);
            const y = f(x);
            const cx = X(x);
            const cy = Y(y);
            if (i === 0) ctx.moveTo(cx, cy);
            else ctx.lineTo(cx, cy);
        }
        ctx.strokeStyle = "rgba(52,211,153,0.8)";
        ctx.lineWidth = 2.5;
        ctx.stroke();
    }

    function drawSecantLine() {
        const fw = f(currentW);
        const fwPlusEps = f(currentW + epsilon);
        const slope = (fwPlusEps - fw) / epsilon;

        // Draw secant line extended
        const lineExtent = 5;
        const x1 = currentW - lineExtent;
        const y1 = fw + slope * (x1 - currentW);
        const x2 = currentW + epsilon + lineExtent;
        const y2 = fw + slope * (x2 - currentW);

        ctx.beginPath();
        ctx.moveTo(X(x1), Y(y1));
        ctx.lineTo(X(x2), Y(y2));
        ctx.strokeStyle = "rgba(251,113,133,0.7)";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw points at w and w+epsilon
        ctx.fillStyle = "rgba(125,211,252,1)";
        ctx.beginPath();
        ctx.arc(X(currentW), Y(fw), 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(251,113,133,1)";
        ctx.beginPath();
        ctx.arc(X(currentW + epsilon), Y(fwPlusEps), 6, 0, Math.PI * 2);
        ctx.fill();

        // Labels
        ctx.fillStyle = "rgba(125,211,252,0.9)";
        ctx.font = "12px system-ui";
        ctx.fillText(`w = ${currentW}`, X(currentW) + 10, Y(fw) - 10);

        if (epsilon >= 0.1) {
            ctx.fillStyle = "rgba(251,113,133,0.9)";
            ctx.fillText(`w + ε = ${formatNumber(currentW + epsilon)}`, X(currentW + epsilon) + 10, Y(fwPlusEps) - 10);
        }

        // Draw epsilon bracket
        if (epsilon >= 0.01) {
            const bracketY = Y(Math.min(fw, fwPlusEps)) + 30;
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(X(currentW), bracketY - 5);
            ctx.lineTo(X(currentW), bracketY);
            ctx.lineTo(X(currentW + epsilon), bracketY);
            ctx.lineTo(X(currentW + epsilon), bracketY - 5);
            ctx.stroke();

            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.font = "11px system-ui";
            const midX = (X(currentW) + X(currentW + epsilon)) / 2;
            ctx.fillText(`ε = ${formatNumber(epsilon)}`, midX - 20, bracketY + 15);
        }
    }

    function drawAxesLabels() {
        ctx.fillStyle = "rgba(231,233,239,0.65)";
        ctx.font = "12px system-ui";
        ctx.fillText(`w: ${xMin}`, 10, canvas.height - 10);
        const r = `w: ${xMax}`;
        const w = ctx.measureText(r).width;
        ctx.fillText(r, canvas.width - w - 10, canvas.height - 10);

        // Formula display
        ctx.fillStyle = "rgba(125,211,252,0.8)";
        ctx.font = "13px system-ui";
        ctx.fillText("f(w) = w² − 4w + 7", 10, 20);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const vignette = ctx.createRadialGradient(
            canvas.width * 0.55, canvas.height * 0.20, 50,
            canvas.width * 0.55, canvas.height * 0.20, canvas.width * 0.9
        );
        vignette.addColorStop(0, "rgba(125,211,252,0.08)");
        vignette.addColorStop(1, "rgba(0,0,0,0.0)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawStars();
        drawGrid();
        drawCurve();
        drawSecantLine();
        drawAxesLabels();
    }

    setWBtn.addEventListener("click", () => {
        const w = Number(wValueInput.value);
        if (Number.isFinite(w) && w >= xMin && w <= xMax - 1) {
            setW(w);
        } else {
            setMessage(`Please enter w between ${xMin} and ${xMax - 1}`, "fail");
        }
    });

    shrinkBtn.addEventListener("click", shrinkEpsilon);
    resetEpsBtn.addEventListener("click", resetEpsilon);

    checkBtn.addEventListener("click", () => {
        const guess = Number(limitGuess.value);
        if (!Number.isFinite(guess)) {
            setMessage("Please enter a number for the limit.", "fail");
            return;
        }

        const correct = derivative(currentW);
        const tolerance = 0.5;
        const isCorrect = Math.abs(guess - correct) <= tolerance;

        limitGuess.classList.remove("correct", "incorrect");
        limitGuess.classList.add(isCorrect ? "correct" : "incorrect");

        if (isCorrect) {
            setMessage(`Correct! The derivative f'(${currentW}) = 2(${currentW}) − 4 = ${correct}`, "success");
        } else {
            setMessage(`Not quite. The limit is ${correct}. Formula: f'(w) = 2w − 4`, "fail");
        }
        checkBtn.disabled = true;
    });

    newBtn.addEventListener("click", () => {
        const randomW = Math.floor(Math.random() * 10) - 3;
        setW(randomW);
    });

    wValueInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") setWBtn.click();
    });

    limitGuess.addEventListener("keypress", (e) => {
        if (e.key === "Enter") checkBtn.click();
    });

    // Initialize
    setW(currentW);
</script>
</body>
</html>
